services:
  - type: web
    name: mourya-scholarium-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: USE_SQLITE
        value: "true"
      - key: CORS_ORIGINS
        sync: false # Set manually to your Vercel frontend URL
      - key: APP_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually if you have one
